services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wordcloud
      POSTGRES_USER: wordcloud
      POSTGRES_PASSWORD: wordcloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordcloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: wordcloud
      RABBITMQ_DEFAULT_PASS: wordcloud
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build: ../wordcloud-core
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wordcloud
      SPRING_DATASOURCE_USERNAME: wordcloud
      SPRING_DATASOURCE_PASSWORD: wordcloud
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: wordcloud
      SPRING_RABBITMQ_PASSWORD: wordcloud
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ../wordcloud-worker
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wordcloud
      SPRING_DATASOURCE_USERNAME: wordcloud
      SPRING_DATASOURCE_PASSWORD: wordcloud
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: wordcloud
      SPRING_RABBITMQ_PASSWORD: wordcloud
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ../wordcloud-frontend
    ports:
      - "80:80"
    depends_on:
      - core

volumes:
  postgres_data:
